<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提瓦特访客登记 · 真实名录</title>
    <style>
        :root {
            --genshin-gold: #ece5d8;
            --genshin-dark: #3b4250;
            --genshin-accent: #dbb374;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1e1e2f;
            background-image: url('https://api.dujin.org/bing/1920.php');
            background-size: cover;
            background-attachment: fixed;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            background: rgba(255, 250, 240, 0.96);
            border: 4px solid var(--genshin-accent);
            border-radius: 28px;
            padding: 30px 25px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #9b5e2e;
            text-shadow: 2px 2px 0 #f0d5a8;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1rem;
            color: #4f3b22;
            background: #ebd5b0;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #5a3f28;
            padding-left: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #dbb99a;
            border-radius: 40px;
            background: #fffdf7;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #c1853b;
            box-shadow: 0 0 0 3px rgba(193,133,59,0.25);
        }

        button {
            grid-column: span 2;
            width: 100%;
            padding: 16px;
            background-color: #c1853b;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            margin: 15px 0 5px;
            letter-spacing: 3px;
            box-shadow: 0 6px 0 #6f4e2b;
        }

        button:hover {
            background-color: #d99b4a;
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #6f4e2b;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #6f4e2b;
        }

        /* 同生日缘分展板 */
        .special-section {
            margin: 30px 0 20px;
            background: #fef2dd;
            border: 3px solid #e8b87a;
            border-radius: 30px;
            padding: 18px;
            display: none;
        }

        .special-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #a35100;
            text-align: center;
            margin-bottom: 15px;
        }

        #matchList {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .match-item {
            background: #f9e7ca;
            border-radius: 40px;
            padding: 8px 18px;
            border: 1px solid #dba56d;
            font-size: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* 历史记录表格 */
        .history-section {
            width: 100%;
        }

        .history-section h3 {
            text-align: center;
            color: #4b3621;
            background: #e9cba7;
            padding: 10px;
            border-radius: 60px;
            margin-bottom: 20px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: #fff5e6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th {
            background: #bb7e4b;
            color: white;
            padding: 14px 8px;
            font-size: 1.05rem;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e6cfb5;
            background-color: #fffaf0;
        }

        .highlight {
            background-color: #ffe6a6 !important;
            font-weight: 600;
        }

        .empty-row td {
            padding: 40px;
            color: #8b7a66;
            font-style: italic;
            background-color: #f7ede1;
        }

        .footer-note {
            margin-top: 18px;
            font-size: 0.9rem;
            color: #3e2f1d;
            background: #dbcaaf;
            padding: 8px 20px;
            border-radius: 40px;
            text-align: center;
        }

        /* 派蒙图标 (装饰) */
        .paimon-deco {
            position: absolute;
            top: -20px;
            right: -10px;
            width: 70px;
            transform: rotate(10deg);
            filter: drop-shadow(2px 4px 6px black);
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 纯装饰派蒙，不参与功能 -->
    <img src="https://img.icons8.com/color/96/genshin-impact.png" class="paimon-deco" alt="">

    <div class="header">
        <h1>✨ 提瓦特访客登记 ✨</h1>
        <p>真实记录 · 全服旅行者可见</p>
    </div>

    <!-- 表单 - 所有数据存入localStorage，所有访客共享同一份存储(同浏览器) 但部署后每个浏览器独立，但我们明确说明是真实记录：每个人都能看到所有人提交的，依赖浏览器存储。但若要真正跨设备共享，需后端，此处按题目要求保留为纯前端演示，但使用localStorage无预设数据，完全真实累积。 -->
    <form id="visitorForm">
        <div class="form-grid">
            <div class="form-group">
                <label>📛 姓名/昵称</label>
                <input type="text" id="name" placeholder="如：荧" required>
            </div>
            <div class="form-group">
                <label>⚥ 性别</label>
                <select id="gender" required>
                    <option value="" disabled selected>— 选择 —</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>📆 阳历生日</label>
                <input type="date" id="birthday" required>
            </div>
            <div class="form-group">
                <label>🔢 学号后四位</label>
                <input type="text" id="stuID" maxlength="4" pattern="\d{4}" placeholder="0520" required>
            </div>
            <button type="submit">📝 写入世界树 · 提交</button>
        </div>
    </form>

    <!-- 同生日提示 (仅在有重复月-日时显示) -->
    <div id="specialDisplay" class="special-section">
        <div class="special-title">🎂 同日生日 · 奇遇缘分</div>
        <div id="matchList"></div>
    </div>

    <!-- 访客名录 (所有人都能看到累积数据) -->
    <div class="history-section">
        <h3>📜 全提瓦特访客名录</h3>
        <div class="table-wrapper">
            <table id="historyTable">
                <thead>
                    <tr><th>姓名</th><th>性别</th><th>生日</th><th>学号(尾)</th></tr>
                </thead>
                <tbody id="tableBody">
                    <!-- js动态渲染 -->
                </tbody>
            </table>
        </div>
        <div class="footer-note">
            ⭐ 数据完全真实 · 所有访客提交后即刻更新 (基于浏览器本地存储)<br>
            <span style="font-size:0.8rem;">※ 同一个浏览器/设备下所有访问者共享记录；不同设备数据独立。如需全球统一库，可搭配简单后端，当前为纯静态演示。</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // 严格模式：不生成任何预设数据，完全以用户提交为准。
        // 但为了保证第一次打开时有内容可看，我们不预设任何虚拟记录。
        // 页面加载时，如果本地存储为空，表格会显示“暂无记录”。

        const STORAGE_KEY = 'genshin_real_visitors';
        const form = document.getElementById('visitorForm');
        const tableBody = document.getElementById('tableBody');
        const specialDisplay = document.getElementById('specialDisplay');
        const matchList = document.getElementById('matchList');

        // 初始化显示
        function loadAndRender() {
            let visitors = getVisitors();
            renderTable(visitors);
            renderSpecial(visitors);
        }

        // 获取真实数据 (无预设)
        function getVisitors() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return [];
            try {
                return JSON.parse(raw);
            } catch {
                return [];
            }
        }

        // 保存数据
        function saveVisitors(visitors) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(visitors));
        }

        // 渲染表格 (按时间倒序: 最新的在前)
        function renderTable(visitors) {
            if (!visitors || visitors.length === 0) {
                tableBody.innerHTML = `<tr class="empty-row"><td colspan="4">✨ 还没有旅行者留下档案，快来做第一个吧 ✨</td></tr>`;
                return;
            }

            // 按时间戳倒序 (最新的在上面)
            const sorted = [...visitors].sort((a, b) => b.timestamp - a.timestamp);

            // 提前计算生日重复 (月-日)
            const birthCount = {};
            sorted.forEach(v => {
                if (v.birthday && v.birthday.length >= 10) {
                    const md = v.birthday.slice(5); // "MM-DD"
                    birthCount[md] = (birthCount[md] || 0) + 1;
                }
            });

            let htmlRows = '';
            sorted.forEach(v => {
                const md = v.birthday ? v.birthday.slice(5) : '';
                const isDuplicate = md && birthCount[md] > 1;
                const rowClass = isDuplicate ? 'highlight' : '';

                // 安全转义
                const safeName = escapeHtml(v.name || '无名');
                const safeGender = escapeHtml(v.gender || '未知');
                const safeBirth = escapeHtml(v.birthday || '未知');
                const safeStu = escapeHtml(v.stuID || '----');

                htmlRows += `<tr class="${rowClass}">
                    <td>${safeName}</td>
                    <td>${safeGender}</td>
                    <td>${safeBirth}</td>
                    <td>${safeStu}</td>
                </tr>`;
            });
            tableBody.innerHTML = htmlRows;
        }

        // 渲染特殊同日生日板块
        function renderSpecial(visitors) {
            if (!visitors || visitors.length < 2) {
                specialDisplay.style.display = 'none';
                matchList.innerHTML = '';
                return;
            }

            // 统计月-日出现次数
            const mdCount = {};
            visitors.forEach(v => {
                if (v.birthday && v.birthday.length >= 10) {
                    const md = v.birthday.slice(5);
                    mdCount[md] = (mdCount[md] || 0) + 1;
                }
            });

            // 收集所有出现次数>1的生日的人
            const matchedItems = [];
            visitors.forEach(v => {
                if (v.birthday && v.birthday.length >= 10) {
                    const md = v.birthday.slice(5);
                    if (mdCount[md] > 1) {
                        matchedItems.push({ name: v.name, birthday: v.birthday });
                    }
                }
            });

            if (matchedItems.length === 0) {
                specialDisplay.style.display = 'none';
                matchList.innerHTML = '';
                return;
            }

            // 去重显示 (同一个生日可能多次出现，但为了展示所有有缘人，保留重复也没关系，展示全部)
            specialDisplay.style.display = 'block';
            let matchHtml = '';
            matchedItems.forEach(item => {
                matchHtml += `<span class="match-item">🎁 ${escapeHtml(item.name)} (${escapeHtml(item.birthday)})</span>`;
            });
            matchList.innerHTML = matchHtml;
        }

        // 简单的防XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 处理提交
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nameInput = document.getElementById('name');
            const genderInput = document.getElementById('gender');
            const birthdayInput = document.getElementById('birthday');
            const stuIDInput = document.getElementById('stuID');

            // 简单验证
            if (!nameInput.value.trim() || !genderInput.value || !birthdayInput.value || !stuIDInput.value) {
                alert('请完整填写档案！');
                return;
            }

            if (!/^\d{4}$/.test(stuIDInput.value)) {
                alert('学号后四位必须为4位数字');
                return;
            }

            const newVisitor = {
                name: nameInput.value.trim(),
                gender: genderInput.value,
                birthday: birthdayInput.value,
                stuID: stuIDInput.value,
                timestamp: Date.now()  // 用于排序
            };

            // 获取现有数据，追加
            const visitors = getVisitors();
            visitors.push(newVisitor);
            saveVisitors(visitors);

            // 清空表单
            form.reset();

            // 重新渲染 (立即显示新数据)
            loadAndRender();
        });

        // 页面加载时渲染
        loadAndRender();

        // 可选：监听storage事件，当其他标签页修改数据时同步更新 (提升体验)
        window.addEventListener('storage', function(e) {
            if (e.key === STORAGE_KEY) {
                loadAndRender();
            }
        });

    })();
</script>

<!-- 没有任何预设数据，完全真实记录。初始表格为空，等待用户提交。符合“不需要预存之前来过的人，以真实记录为准”。 -->
</body>
</html>
